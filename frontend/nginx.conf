server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # O Ingress remove /grupo2 antes de encaminhar a requisição.
    # Portanto, a raiz deve servir diretamente o index.html.
    location = / {
        try_files /index.html =404;
    }

    # Permite também o teste local em localhost:3000/grupo2/.
    location /grupo2/ {
        rewrite ^/grupo2/(.*)$ /$1 break;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}