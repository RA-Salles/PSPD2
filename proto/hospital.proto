syntax = "proto3";

package hospital;

// 1. SERVIÇO DE AUTORIZAÇÃO 

service AuthService {
  // valida o JWT e retorna o nível de acesso
  rpc VerifyAccess (AuthRequest) returns (AuthResponse);
}

message AuthRequest {
  string jwt_token = 1;         // token enviado pelo Frontend
  string requested_scope = 2;   // ex: "ResumoClinico" ou "ResumoCoorte"
  string target_id = 3;         // ex: ID do paciente  ou projeto 
}

message AuthResponse {
  string access_level = 1;      // "FULL", "PARTIAL", "ANONYMIZED", "AGGREGATED", "DENY"
}

// 2. SERVIÇO DE DADOS DE PACIENTES

service PatientDataService {
  // chamada unaria: Para buscar um paciente específico (Médicos/Estagiários)
  rpc GetSinglePatientData (SinglePatientRequest) returns (PatientDataResponse);
  
  // server streaming: para pesquisadores buscar coortes gigantes sem estourar a memória
  rpc StreamCohortData (CohortRequest) returns (stream PatientDataResponse);
}

message SinglePatientRequest {
  string patient_id = 1;
  string access_level = 2;      // nivel de permissão validado no passo anterior
}

message CohortRequest {
  string project_id = 1;
  string condition_code = 2;    // ex: "Diabetes"
  string access_level = 3;
}

message PatientDataResponse {
  // informaçao do paciente enviada pelo banco
  string raw_database = 1; 
}

// 3. SERVIÇO DE TRANSFORMAÇÃO DE DADOS 

service DataTransformService {
  // recebe os dados brutos, anonimiza e converte para HL7/FHIR
  rpc TransformToFHIR (TransformRequest) returns (TransformResponse);
}

message TransformRequest {
  string raw_database = 1; // dados que vieram do banco
  string access_level = 2; // diz ao serviço o quanto ele precisa "esconder" ou agregar
}

message TransformResponse {
  string fhir_payload = 1; // Estrutura finaL no padrão HL7/FHIR
}